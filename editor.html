<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedWasher Editor</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌀</text></svg>">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0a0a; color: #e0e0e0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; }

        #top-bar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: #111; border-bottom: 1px solid #333; }
        #top-bar a { color: #7dd3fc; text-decoration: none; }
        #top-bar select { background: #222; color: #e0e0e0; border: 1px solid #444; padding: 4px 8px; border-radius: 4px; font-family: inherit; }
        #top-bar .stats { color: #888; font-size: 0.85em; margin-left: auto; }

        #main { display: flex; flex: 1; overflow: hidden; }

        /* Editor pane */
        #editor-pane { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; }
        #editor-textarea {
            flex: 1; background: #0d0d0d; color: #d4d4d4; border: none; padding: 12px;
            font-family: 'Courier New', monospace; font-size: 14px; line-height: 1.6;
            resize: none; outline: none; tab-size: 4;
        }

        /* Right pane: timeline + lint */
        #right-pane { width: 380px; display: flex; flex-direction: column; }

        /* Timeline */
        #timeline-section { border-bottom: 1px solid #333; padding: 12px; }
        #timeline-section h3 { font-size: 0.85em; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        #timeline-canvas { width: 100%; height: 60px; border-radius: 4px; cursor: pointer; }
        #timeline-legend { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        #timeline-legend span { font-size: 0.75em; display: flex; align-items: center; gap: 4px; }
        #timeline-legend .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

        /* Events strip */
        #events-canvas { width: 100%; height: 24px; margin-top: 4px; }

        /* Lint panel */
        #lint-section { flex: 1; overflow-y: auto; padding: 12px; }
        #lint-section h3 { font-size: 0.85em; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .lint-item { padding: 6px 8px; border-radius: 4px; margin-bottom: 4px; font-size: 0.85em; line-height: 1.4; }
        .lint-error { background: #3b1111; border-left: 3px solid #ef4444; }
        .lint-warning { background: #3b2e11; border-left: 3px solid #eab308; }
        .lint-ok { color: #4ade80; padding: 12px; text-align: center; }

        /* Scrub tooltip */
        #scrub-tooltip {
            position: absolute; background: #222; color: #fff; padding: 4px 8px;
            border-radius: 4px; font-size: 0.75em; pointer-events: none; display: none;
            white-space: nowrap; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <a href="index.html">&larr; Player</a>
        <select id="script-select">
            <option value="">Load a script...</option>
        </select>
        <div class="stats" id="stats"></div>
    </div>

    <div id="main">
        <div id="editor-pane">
            <textarea id="editor-textarea" placeholder="Paste or load a script..." spellcheck="false"></textarea>
        </div>

        <div id="right-pane">
            <div id="timeline-section">
                <h3>Timeline</h3>
                <canvas id="timeline-canvas" height="60"></canvas>
                <canvas id="events-canvas" height="24"></canvas>
                <div id="timeline-legend">
                    <span><span class="dot" style="background:#ef4444"></span>Red</span>
                    <span><span class="dot" style="background:#22c55e"></span>Green</span>
                    <span><span class="dot" style="background:#eab308"></span>Yellow</span>
                    <span><span class="dot" style="background:#8B5CF6"></span>Purple</span>
                    <span><span class="dot" style="background:#e91e8c"></span>Raspberry</span>
                    <span><span class="dot" style="background:#ec4899"></span>Pink</span>
                    <span><span class="dot" style="background:#f59e0b"></span>Branch</span>
                    <span><span class="dot" style="background:#a78bfa"></span>Label</span>
                    <span><span class="dot" style="background:#4ade80"></span>Goto</span>
                </div>
            </div>

            <div id="lint-section">
                <h3>Lint</h3>
                <div id="lint-output"><div class="lint-ok">Load a script to lint</div></div>
            </div>
        </div>
    </div>

    <div id="scrub-tooltip"></div>

    <script src="js/lint-browser.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const textarea = document.getElementById('editor-textarea');
        const timelineCanvas = document.getElementById('timeline-canvas');
        const eventsCanvas = document.getElementById('events-canvas');
        const lintOutput = document.getElementById('lint-output');
        const statsEl = document.getElementById('stats');
        const scriptSelect = document.getElementById('script-select');
        const tooltip = document.getElementById('scrub-tooltip');

        const COLOR_MAP = {
            red: '#ef4444', green: '#22c55e', yellow: '#eab308',
            purple: '#8B5CF6', raspberry: '#e91e8c', pink: '#ec4899',
            off: '#333'
        };

        // Populate script dropdown
        const scripts = [
            'demo',
            'brat_sfw', 'brat_nsfw',
            'mommy_sfw', 'mommy_nsfw',
            'yandere_sfw', 'yandere_nsfw',
            'teacher_sfw', 'teacher_nsfw',
            'succubus_sfw', 'succubus_nsfw',
            'drone_sfw', 'drone_nsfw',
            'puppet_sfw', 'puppet_nsfw',
            'pet_sfw', 'pet_nsfw',
            'maid_sfw', 'maid_nsfw',
            'venus_golden_path', 'venus_nsfw', 'venus_cum',
            'dark_therapy_nsfw',
            'obedience_nsfw', 'mask_nsfw',
            'clarity_sfw', 'purification_sfw', 'doll_sfw',
            'paf_drone', 'test_all'
        ];
        for (const s of scripts) {
            const opt = document.createElement('option');
            opt.value = s;
            opt.textContent = s.replace(/_/g, ' ');
            scriptSelect.appendChild(opt);
        }

        scriptSelect.addEventListener('change', async () => {
            if (!scriptSelect.value) return;
            try {
                const resp = await fetch(`scripts/${scriptSelect.value}.txt`);
                if (!resp.ok) throw new Error('Not found');
                textarea.value = await resp.text();
                update();
            } catch (e) {
                lintOutput.innerHTML = '<div class="lint-item lint-error">Failed to load script</div>';
            }
        });

        let debounceTimer = null;
        textarea.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(update, 300);
        });

        function update() {
            const text = textarea.value;
            if (!text.trim()) {
                lintOutput.innerHTML = '<div class="lint-ok">Empty script</div>';
                clearTimeline();
                statsEl.textContent = '';
                return;
            }

            const { findings, events, phases, totalWords } = LintEngine.lint(text, scriptSelect.value || 'script.txt');
            const totalDuration = LintEngine.getTotalDuration(events);

            // Stats
            const mins = Math.floor(totalDuration / 60);
            const secs = Math.round(totalDuration % 60);
            statsEl.textContent = `${totalWords} words | ${mins}m ${secs}s | ${phases.length} phases`;

            // Timeline
            drawTimeline(phases, totalDuration, events);

            // Lint
            if (findings.length === 0) {
                lintOutput.innerHTML = '<div class="lint-ok">All checks passed</div>';
            } else {
                lintOutput.innerHTML = findings.map(f =>
                    `<div class="lint-item lint-${f.severity === 'error' ? 'error' : 'warning'}">${f.rule}: ${f.msg}</div>`
                ).join('');
            }
        }

        function clearTimeline() {
            const ctx = timelineCanvas.getContext('2d');
            ctx.clearRect(0, 0, timelineCanvas.width, timelineCanvas.height);
            const ectx = eventsCanvas.getContext('2d');
            ectx.clearRect(0, 0, eventsCanvas.width, eventsCanvas.height);
        }

        let currentPhases = [];
        let currentTotalDuration = 0;

        function drawTimeline(phases, totalDuration, events) {
            currentPhases = phases;
            currentTotalDuration = totalDuration;

            // Color phases
            const canvas = timelineCanvas;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = canvas.offsetWidth * dpr;
            canvas.height = 60 * dpr;
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            const w = canvas.offsetWidth;
            const h = 60;

            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, w, h);

            if (totalDuration <= 0) return;

            let elapsed = 0;
            for (const phase of phases) {
                const x = (elapsed / totalDuration) * w;
                const pw = (phase.durationSec / totalDuration) * w;
                ctx.fillStyle = COLOR_MAP[phase.color] || '#333';
                ctx.fillRect(x, 0, Math.max(1, pw), h);
                elapsed += phase.durationSec;
            }

            // Events strip
            const ecanvas = eventsCanvas;
            ecanvas.width = ecanvas.offsetWidth * dpr;
            ecanvas.height = 24 * dpr;
            const ectx = ecanvas.getContext('2d');
            ectx.scale(dpr, dpr);
            const ew = ecanvas.offsetWidth;

            ectx.fillStyle = '#111';
            ectx.fillRect(0, 0, ew, 24);

            // Compute cumulative time for each event
            let cumMs = 0;
            const totalMs = totalDuration * 1000;
            for (const ev of events) {
                const x = (cumMs / totalMs) * ew;
                if (ev.type === 'snap') {
                    ectx.fillStyle = '#ffffff';
                    ectx.fillRect(x, 0, 2, 24);
                    cumMs += ev.pauseMs;
                } else if (ev.type === 'sfx') {
                    ectx.fillStyle = '#fbbf24';
                    ectx.beginPath();
                    ectx.arc(x, 12, 3, 0, Math.PI * 2);
                    ectx.fill();
                } else if (ev.type === 'wpm') {
                    ectx.fillStyle = '#7dd3fc';
                    ectx.fillRect(x, 18, 1, 6);
                } else if (ev.type === 'pause') {
                    ectx.fillStyle = '#666';
                    ectx.fillRect(x, 4, 1, 16);
                    cumMs += ev.pauseMs;
                } else if (ev.type === 'branch') {
                    // Diamond marker for branch point
                    ectx.fillStyle = '#f59e0b';
                    ectx.beginPath();
                    ectx.moveTo(x, 4); ectx.lineTo(x + 6, 12);
                    ectx.lineTo(x, 20); ectx.lineTo(x - 6, 12);
                    ectx.closePath(); ectx.fill();
                } else if (ev.type === 'label') {
                    // Flag marker for label
                    ectx.fillStyle = '#a78bfa';
                    ectx.fillRect(x, 0, 2, 24);
                    ectx.font = '9px monospace';
                    ectx.fillText(ev.name, x + 4, 10);
                } else if (ev.type === 'goto') {
                    // Arrow marker for goto
                    ectx.fillStyle = '#4ade80';
                    ectx.fillRect(x, 10, 8, 2);
                    ectx.beginPath();
                    ectx.moveTo(x + 8, 6); ectx.lineTo(x + 8, 16);
                    ectx.lineTo(x + 14, 11); ectx.closePath(); ectx.fill();
                } else if (ev.type === 'word') {
                    cumMs += LintEngine.getWordInterval(ev.wpm, ev.text);
                }
            }
        }

        // Scrub tooltip on timeline hover
        timelineCanvas.addEventListener('mousemove', (e) => {
            if (!currentPhases.length || !currentTotalDuration) return;
            const rect = timelineCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const pct = x / rect.width;
            const timeSec = pct * currentTotalDuration;

            let elapsed = 0;
            let phase = null;
            for (const p of currentPhases) {
                if (elapsed + p.durationSec >= timeSec) { phase = p; break; }
                elapsed += p.durationSec;
            }

            if (phase) {
                const mins = Math.floor(timeSec / 60);
                const secs = Math.round(timeSec % 60);
                tooltip.textContent = `${mins}:${String(secs).padStart(2, '0')} | ${phase.color} (${phase.durationSec.toFixed(1)}s)`;
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 12) + 'px';
                tooltip.style.top = (e.clientY - 30) + 'px';
            }
        });

        timelineCanvas.addEventListener('mouseleave', () => {
            tooltip.style.display = 'none';
        });

        // Click timeline to scroll editor to that section
        timelineCanvas.addEventListener('click', (e) => {
            if (!currentPhases.length || !currentTotalDuration) return;
            const rect = timelineCanvas.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            const timeSec = pct * currentTotalDuration;

            let elapsed = 0;
            for (const p of currentPhases) {
                if (elapsed + p.durationSec >= timeSec) {
                    // Scroll to that line in the textarea
                    const text = textarea.value;
                    const lines = text.split('\n');
                    let charPos = 0;
                    for (let i = 0; i < Math.min(p.startLine - 1, lines.length); i++) {
                        charPos += lines[i].length + 1;
                    }
                    textarea.focus();
                    textarea.setSelectionRange(charPos, charPos);
                    // Scroll into view
                    const lineHeight = 22.4; // approximate
                    textarea.scrollTop = (p.startLine - 5) * lineHeight;
                    break;
                }
                elapsed += p.durationSec;
            }
        });
    });
    </script>
</body>
</html>
